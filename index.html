<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evento - Cadastro e Validação</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .wrap {
      max-width: 960px;
      margin: 24px auto;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(0,0,0,0.10);
    }
    .tabs {
      display: flex;
      gap: 10px;
      background: #111827;
      padding: 16px;
      flex-wrap: wrap;
    }
    .tabs button {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      color: #fff;
      background: #374151;
      font-weight: bold;
      cursor: pointer;
    }
    .tabs button.active {
      background: #2563eb;
    }
    .screen {
      display: none;
      padding: 28px;
    }
    .screen.active {
      display: block;
    }
    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, 1fr);
    }
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }
    label {
      font-size: 14px;
      font-weight: bold;
    }
    input {
      padding: 14px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      width: 100%;
    }
    button.primary, button.secondary, button.warn {
      border: 0;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      margin-right: 10px;
      margin-top: 8px;
    }
    button.primary { background: #16a34a; }
    button.secondary { background: #2563eb; }
    button.warn { background: #d97706; }
    .card {
      margin-top: 18px;
      padding: 18px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
    }
    .code-box {
      margin-top: 12px;
      padding: 18px;
      border: 2px dashed #16a34a;
      border-radius: 14px;
      background: #ecfdf5;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
      letter-spacing: 4px;
      word-break: break-word;
    }
    .status {
      padding: 14px;
      border-radius: 12px;
      font-weight: bold;
      margin-bottom: 12px;
    }
    .ok { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
    .warnbox { background: #fef3c7; color: #92400e; }
    .line { margin: 8px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="tabs">
      <button id="btnCadastro" class="active" onclick="mostrarTela('cadastro')">Cadastro</button>
      <button id="btnValidador" onclick="mostrarTela('validador')">Validador</button>
    </div>

    <section id="cadastro" class="screen active">
      <h1>Cadastro do Evento</h1>
      <p>Preencha seus dados. No final, você receberá um código de confirmação.</p>

      <div class="grid">
        <div class="field">
          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Digite seu nome">
        </div>

        <div class="field">
          <label for="telefone">Telefone</label>
          <input type="text" id="telefone" placeholder="(00) 00000-0000">
        </div>

        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="voce@email.com">
        </div>
      </div>

      <button id="btnFinalizar" class="primary" onclick="finalizarCadastro()">Finalizar cadastro</button>

      <div id="resultadoCadastro" class="card" style="display:none;">
        <h2>Cadastro concluído</h2>
        <p>Seu código de confirmação é:</p>
        <div id="codigoGerado" class="code-box"></div>
      </div>
    </section>

    <section id="validador" class="screen">
      <h1>Validador</h1>
      <p>Digite o código informado pelo participante.</p>

      <div class="field">
        <label for="codigoConsulta">Código</label>
        <input type="text" id="codigoConsulta" placeholder="Ex: A7K93P">
      </div>

      <button id="btnValidar" class="secondary" onclick="validarCodigo()">Validar código</button>

      <div id="resultadoValidacao" class="card" style="display:none;"></div>
    </section>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxIq5JNgwjMmmi-aMa8XnzfHSfLIDsrGqDYYZ24ur3hlcul0g0UPcJIG_xDqoCzGBo/exec";

    function mostrarTela(tela) {
      document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
      document.querySelectorAll(".tabs button").forEach(el => el.classList.remove("active"));
      document.getElementById(tela).classList.add("active");
      document.getElementById(tela === "cadastro" ? "btnCadastro" : "btnValidador").classList.add("active");
    }

    async function finalizarCadastro() {
      const nome = document.getElementById("nome").value.trim();
      const telefone = document.getElementById("telefone").value.trim();
      const email = document.getElementById("email").value.trim();

      if (!nome || !telefone || !email) {
        alert("Preencha nome, telefone e e-mail.");
        return;
      }

      try {
        const url = `${API_URL}?acao=cadastrar&nome=${encodeURIComponent(nome)}&telefone=${encodeURIComponent(telefone)}&email=${encodeURIComponent(email)}`;
        const resposta = await fetch(url);
        const dados = await resposta.json();

        if (!dados.ok) {
          throw new Error(dados.mensagem || "Erro ao cadastrar.");
        }

        document.getElementById("codigoGerado").textContent = dados.codigo;
        document.getElementById("resultadoCadastro").style.display = "block";
      } catch (erro) {
        alert("Erro ao finalizar cadastro: " + erro.message);
      }
    }

    async function validarCodigo() {
      const codigo = document.getElementById("codigoConsulta").value.trim().toUpperCase();
      const box = document.getElementById("resultadoValidacao");

      if (!codigo) {
        alert("Digite um código.");
        return;
      }

      try {
        const resposta = await fetch(`${API_URL}?acao=validar&codigo=${encodeURIComponent(codigo)}`);
        const dados = await resposta.json();

        box.style.display = "block";

        if (!dados.ok) {
          box.innerHTML = `<div class="status error">${dados.mensagem || "Erro na validação."}</div>`;
          return;
        }

        if (!dados.encontrado) {
          box.innerHTML = `<div class="status error">Código inválido. Nenhum cadastro encontrado.</div>`;
          return;
        }

        if (dados.status === "usado") {
          box.innerHTML = `
            <div class="status warnbox">Código encontrado, mas já foi utilizado.</div>
            <div class="line"><strong>Nome:</strong> ${dados.nome || "-"}</div>
            <div class="line"><strong>Telefone:</strong> ${dados.telefone || "-"}</div>
            <div class="line"><strong>E-mail:</strong> ${dados.email || "-"}</div>
          `;
          return;
        }

        box.innerHTML = `
          <div class="status ok">Código válido. Cadastro confirmado.</div>
          <div class="line"><strong>Nome:</strong> ${dados.nome || "-"}</div>
          <div class="line"><strong>Telefone:</strong> ${dados.telefone || "-"}</div>
          <div class="line"><strong>E-mail:</strong> ${dados.email || "-"}</div>
          <div class="line"><strong>Status:</strong> ${dados.status || "-"}</div>
          <button class="warn" onclick="marcarUsado('${codigo}')">Marcar como usado</button>
        `;
      } catch (erro) {
        box.style.display = "block";
        box.innerHTML = `<div class="status error">Erro ao validar: ${erro.message}</div>`;
      }
    }

    async function marcarUsado(codigo) {
      try {
        const resposta = await fetch(`${API_URL}?acao=marcarusado&codigo=${encodeURIComponent(codigo)}`);
        const dados = await resposta.json();

        if (!dados.ok) {
          throw new Error(dados.mensagem || "Erro ao marcar como usado.");
        }

        alert("Código marcado como usado.");
        validarCodigo();
      } catch (erro) {
        alert("Erro: " + erro.message);
      }
    }
  </script>
</body>
</html>
